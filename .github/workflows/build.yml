name: Build and Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build uber-JAR
        run: mvn clean package --batch-mode

      - name: Upload uber-JAR
        uses: actions/upload-artifact@v4
        with:
          name: PharmarcieManager-uber-jar
          path: target/PharmarcieManagement-1.0-SNAPSHOT.jar

      - name: Download JavaFX jmods for Windows
        run: |
          $url = "https://download2.gluonhq.com/openjfx/21/openjfx-21_windows-x64_bin-jmods.zip"
          $output = "$env:RUNNER_TEMP\javafx-jmods.zip"
          Invoke-WebRequest -Uri $url -OutFile $output
          Expand-Archive -Path $output -DestinationPath "$env:RUNNER_TEMP\javafx-jmods"

      - name: Generate app-image
        run: |
          jpackage --type app-image `
            --input target/ `
            --main-jar PharmarcieManagement-1.0-SNAPSHOT.jar `
            --main-class tg.univlome.epl.pharmarciemanagement.PharmarcieManagement `
            --name PharmarcieManager `
            --module-path "$env:RUNNER_TEMP\javafx-jmods\javafx-jmods-21" `
            --add-modules javafx.controls,javafx.fxml `
            --dest output

      - name: Generate installer
        run: |
          jpackage --type exe `
            --input target/ `
            --main-jar PharmarcieManagement-1.0-SNAPSHOT.jar `
            --main-class tg.univlome.epl.pharmarciemanagement.PharmarcieManagement `
            --name PharmarcieManager `
            --module-path "$env:RUNNER_TEMP\javafx-jmods\javafx-jmods-21" `
            --add-modules javafx.controls,javafx.fxml `
            --dest output

      - name: Upload app-image artifact
        uses: actions/upload-artifact@v4
        with:
          name: PharmarcieManager-app-image
          path: output/PharmarcieManager

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PharmarcieManager-installer
          path: output/*.exe
